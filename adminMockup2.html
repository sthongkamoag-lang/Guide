<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - GPF NAV Update (With Preview)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style> body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; } </style>
</head>
<body class="p-6 relative">

    <div class="max-w-4xl mx-auto bg-white p-8 rounded-xl shadow-sm border-t-4 border-indigo-800">
        <div class="flex justify-between items-center mb-6 border-b pb-4">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">อัปเดตราคา NAV ประจำวัน</h1>
                <p class="text-sm text-gray-500 mt-1">ระบบฐานข้อมูล Tier 2 (Admin Only)</p>
            </div>
            <div class="bg-indigo-50 text-indigo-700 px-4 py-2 rounded-lg text-sm font-semibold">
                Welfare Master Ecosystem
            </div>
        </div>

        <form id="navForm" action="#" method="POST">
            <div class="mb-8 bg-gray-50 p-4 rounded-lg border border-gray-200">
                <label class="block text-sm font-semibold text-gray-700 mb-2">เลือกวันที่ของราคา NAV</label>
                <input type="date" id="navDate" class="w-full md:w-1/3 px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500" required>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                
                <div class="flex flex-col">
                    <label class="text-sm text-gray-600 mb-1">แผนหลัก</label>
                    <input type="number" id="p_main" step="0.0001" placeholder="เช่น 30.8848" class="px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>

                <div class="flex flex-col">
                    <label class="text-sm text-gray-600 mb-1">แผนหุ้น 35%</label>
                    <input type="number" id="p_stock35" step="0.0001" placeholder="เช่น 35.1846" class="px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>

                <div class="flex flex-col">
                    <label class="text-sm text-gray-600 mb-1">แผนตราสารหนี้</label>
                    <input type="number" id="p_debt" step="0.0001" placeholder="เช่น 24.2503" class="px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>

                <div class="flex flex-col">
                    <label class="text-sm text-gray-600 mb-1">แผนหุ้นต่างประเทศ</label>
                    <input type="number" id="p_foreign" step="0.0001" placeholder="เช่น 34.2212" class="px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>

                <div class="flex flex-col">
                    <label class="text-sm text-gray-600 mb-1">แผนทองคำ</label>
                    <input type="number" id="p_gold" step="0.0001" placeholder="เช่น 67.7236" class="px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>

                <div class="flex flex-col">
                    <label class="text-sm text-gray-600 mb-1">แผนวายุภักษ์</label>
                    <input type="number" id="p_vayu" step="0.0001" placeholder="เช่น 11.9758" class="px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>

            </div>

            <div class="flex justify-end">
                <button type="button" onclick="showPreview()" class="bg-indigo-700 hover:bg-indigo-800 text-white font-semibold py-3 px-8 rounded-lg shadow-md transition duration-200">
                    🔍 ตรวจทานข้อมูล (Preview)
                </button>
            </div>
        </form>
    </div>

    <div id="previewModal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-50 flex justify-center items-center z-50">
        <div class="bg-white rounded-xl shadow-2xl max-w-lg w-full p-8 transform transition-all">
            <h2 class="text-2xl font-bold text-gray-800 mb-4 flex items-center">
                <span class="text-yellow-500 mr-2">⚠️</span> ยืนยันความถูกต้องของข้อมูล
            </h2>
            <p class="text-sm text-gray-600 mb-6">โปรดตรวจสอบตัวเลขทศนิยมอีกครั้ง เพื่อป้องกันข้อผิดพลาดในการคำนวณพอร์ตของสมาชิก</p>
            
            <div id="previewContent" class="bg-gray-50 border border-gray-200 rounded-lg p-4 mb-6">
                </div>

            <div class="flex justify-end space-x-4">
                <button type="button" onclick="closePreview()" class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 font-semibold hover:bg-gray-100 transition">
                    ✏️ กลับไปแก้ไข
                </button>
                <button type="button" onclick="submitData()" class="px-6 py-2 bg-green-600 hover:bg-green-700 text-white font-semibold rounded-lg shadow-md transition">
                    ✅ ยืนยันและบันทึกข้อมูล
                </button>
            </div>
        </div>
    </div>

    <script>
        function showPreview() {
            const dateVal = document.getElementById('navDate').value;
            if (!dateVal) {
                alert('กรุณาเลือกวันที่ ก่อนทำการตรวจสอบข้อมูลครับ');
                return;
            }

            // Map ข้อมูล Input กับชื่อแผน
            const plans = [
                { id: 'p_main', name: 'แผนหลัก' },
                { id: 'p_stock35', name: 'แผนหุ้น 35%' },
                { id: 'p_debt', name: 'แผนตราสารหนี้' },
                { id: 'p_foreign', name: 'แผนหุ้นต่างประเทศ' },
                { id: 'p_gold', name: 'แผนทองคำ' },
                { id: 'p_vayu', name: 'แผนวายุภักษ์' }
            ];

            let htmlString = `<div class="mb-3 border-b pb-2"><span class="font-semibold text-gray-700">วันที่อัปเดต:</span> <span class="text-indigo-700 font-bold">${dateVal}</span></div>`;
            htmlString += `<ul class="space-y-2">`;

            plans.forEach(plan => {
                const inputVal = document.getElementById(plan.id).value;
                // ตรวจสอบ Edge Case: ถ้าไม่ได้กรอกข้อมูล
                const displayVal = inputVal 
                   ? `<span class="text-green-700 font-bold text-lg">${parseFloat(inputVal).toFixed(4)}</span>` 
                    : `<span class="text-gray-400 text-sm italic">ไม่ได้กรอก (ข้าม)</span>`;
                
                htmlString += `<li class="flex justify-between items-center bg-white p-2 rounded shadow-sm border border-gray-100">
                                <span class="text-gray-700">${plan.name}</span>
                                ${displayVal}
                               </li>`;
            });
            htmlString += `</ul>`;

            // นำข้อมูลไปใส่ใน Modal และแสดงผล
            document.getElementById('previewContent').innerHTML = htmlString;
            document.getElementById('previewModal').classList.remove('hidden');
        }

        function closePreview() {
            // ซ่อน Modal เพื่อกลับไปหน้า Edit
            document.getElementById('previewModal').classList.add('hidden');
        }

        function submitData() {
            // โค้ดสำหรับส่งข้อมูลเข้า Database (API) จะอยู่ตรงนี้
            alert('บันทึกข้อมูลราคา NAV ลงฐานข้อมูลสำเร็จ!');
            document.getElementById('previewModal').classList.add('hidden');
            document.getElementById('navForm').reset(); // เคลียร์ฟอร์ม
        }
    </script>

</body>
</html>
